# Codex platform registration — Production Master thin client.
#
# Claude Code is wired end-to-end today (see .claude-plugin/plugin.json + commands/,
# backed by packages/adapter-claude-code). The Codex host adapter
# (packages/adapter-codex) currently ships the HostAdapter only; its runnable entry
# point lands in a follow-up, at which point the registration below is uncommented.
#
# The thin client authenticates with device-code login and talks to the hosted
# service over HTTPS + SSE. Configure the service endpoint with PM_SERVICE_URL
# (default https://api.productionmaster.ai). Secrets are ${ENV} references only —
# never literals.
#
# [mcp_servers.production-master]
# command = "node"
# args = ["packages/adapter-codex/dist/cli.js", "mcp"]
#
# [mcp_servers.production-master.env]
# PM_SERVICE_URL = "${PM_SERVICE_URL:-https://api.productionmaster.ai}"
