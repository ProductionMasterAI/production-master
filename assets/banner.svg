<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200" role="img" aria-label="Production Master — IDE thin client for autonomous incident investigation">
  <title>Production Master</title>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D97757"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="200" fill="#0F1117"/>

  <!-- subtle accent stripe -->
  <rect x="60" y="118" width="200" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- small accent glyph -->
  <g transform="translate(60 74)">
    <circle cx="0" cy="0" r="5" fill="#D97757"/>
    <circle cx="20" cy="0" r="5" fill="#D97757" fill-opacity="0.55"/>
    <circle cx="40" cy="0" r="5" fill="#D97757" fill-opacity="0.25"/>
  </g>

  <text x="60" y="108"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="46" font-weight="700" fill="#F5F6F8" letter-spacing="-0.5">
    Production Master
  </text>

  <text x="62" y="150"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="17" font-weight="400" fill="#8B949E" letter-spacing="0.2">
    IDE thin client for autonomous incident investigation
  </text>
</svg>
